<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>עורך ChordPro</title>
<style>
  :root {
    --bg: #1a1d23;
    --panel: #252932;
    --panel-2: #2e333d;
    --border: #3a3f4b;
    --text: #e6e8eb;
    --muted: #9aa0a8;
    --accent: #4fa3ff;
    --accent-2: #ffb84f;
    --chord: #ff7a59;
    --directive: #b489ff;
    --section: #6ad17a;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: "Segoe UI", "Heebo", "Arial Hebrew", sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
  }
  header {
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    padding: 10px 16px;
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    align-items: center;
  }
  header h1 {
    margin: 0 8px 0 0;
    font-size: 18px;
    font-weight: 600;
  }
  header input[type="text"] {
    background: var(--panel-2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 6px 10px;
    border-radius: 6px;
    font-size: 13px;
    font-family: inherit;
  }
  header input[type="text"]:focus { outline: none; border-color: var(--accent); }
  #metaTitle { width: 200px; font-weight: 600; }
  #metaArtist { width: 140px; }
  #metaKey { width: 56px; text-align: center; font-family: ui-monospace, "Consolas", monospace; color: var(--accent-2); font-weight: 700; }
  .btn {
    background: var(--panel-2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 6px 12px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
    font-family: inherit;
  }
  .btn:hover { border-color: var(--accent); color: var(--accent); }
  .btn.primary { background: var(--accent); color: #0a0c10; border-color: var(--accent); font-weight: 600; }
  .btn.primary:hover { filter: brightness(1.1); color: #0a0c10; }

  .transpose-box {
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--panel-2);
    border: 1px solid var(--border);
    padding: 6px 12px;
    border-radius: 8px;
  }
  .transpose-box label { color: var(--muted); font-size: 13px; }
  .transpose-box button {
    background: var(--panel);
    border: 1px solid var(--border);
    color: var(--text);
    width: 28px;
    height: 28px;
    border-radius: 6px;
    cursor: pointer;
    font-weight: 700;
  }
  .transpose-box input[type="range"] { width: 160px; accent-color: var(--accent); }
  #transposeValue {
    background: var(--accent);
    color: #0a0c10;
    padding: 3px 10px;
    border-radius: 6px;
    font-weight: 700;
    min-width: 36px;
    text-align: center;
    font-family: ui-monospace, "Consolas", monospace;
  }
  #currentKey { color: var(--accent-2); font-weight: 700; font-family: ui-monospace, "Consolas", monospace; }

  .size-ctrl {
    display: flex;
    align-items: center;
    gap: 4px;
    color: var(--muted);
    font-size: 12px;
    background: var(--panel-2);
    border: 1px solid var(--border);
    padding: 4px 8px;
    border-radius: 6px;
  }
  .size-ctrl input[type="range"] { width: 80px; accent-color: var(--accent); }

  main {
    flex: 1;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1px;
    background: var(--border);
    overflow: hidden;
  }
  .pane {
    background: var(--bg);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .pane-header {
    padding: 6px 12px;
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    font-size: 12px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .pane-body { flex: 1; overflow: auto; padding: 12px; }

  #editor {
    width: 100%;
    height: 100%;
    background: var(--bg);
    border: none;
    color: var(--text);
    padding: 12px;
    font-family: ui-monospace, "Cascadia Code", "Consolas", "Courier New", monospace;
    font-size: 14px;
    line-height: 1.7;
    resize: none;
    outline: none;
    unicode-bidi: plaintext;
    white-space: pre;
    overflow: auto;
  }

  /* ChordPro source syntax highlighting hints via JS would be nice — for
     now we just style preview output. */

  #preview {
    --preview-font-size: 16px;
    --preview-line-height: 1.6;
    font-size: var(--preview-font-size);
    line-height: var(--preview-line-height);
    font-family: "Segoe UI", "Heebo", "Arial Hebrew", sans-serif;
  }
  /* On-screen two-column toggle (also controls print layout via @media) */
  #preview.two-cols {
    column-count: 2;
    column-gap: 28px;
    column-rule: 1px dashed var(--border);
  }
  /* Make the entire preview right-aligned for Hebrew songs and left-
     aligned for English. Scoped to #preview so the document <html> dir
     doesn't cascade in unexpectedly. */
  #preview[dir="rtl"] { direction: rtl; text-align: right; }
  #preview[dir="ltr"] { direction: ltr; text-align: left; }
  #preview[dir="rtl"] .song-title,
  #preview[dir="rtl"] .song-artist,
  #preview[dir="rtl"] .song-meta,
  #preview[dir="rtl"] .section,
  #preview[dir="rtl"] .comment { text-align: right; }
  #preview[dir="ltr"] .song-title,
  #preview[dir="ltr"] .song-artist,
  #preview[dir="ltr"] .song-meta,
  #preview[dir="ltr"] .section,
  #preview[dir="ltr"] .comment { text-align: left; }

  .song-title {
    font-size: 1.6em;
    font-weight: 700;
    margin: 0 0 4px;
    color: var(--text);
  }
  .song-artist {
    color: var(--muted);
    margin: 0 0 4px;
    font-size: 1em;
  }
  .song-meta {
    color: var(--muted);
    font-size: 0.85em;
    margin: 0 0 14px;
  }
  .song-meta span + span::before { content: " · "; padding: 0 4px; }

  .section {
    margin: 14px 0;
    padding: 6px 10px;
    border-inline-start: 3px solid var(--border);
  }
  .section.chorus {
    border-inline-start-color: var(--section);
    background: rgba(106, 209, 122, 0.05);
  }
  .section.bridge {
    border-inline-start-color: var(--accent-2);
    background: rgba(255, 184, 79, 0.05);
  }
  .section .section-label {
    color: var(--section);
    font-weight: 700;
    font-size: 0.85em;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin: 0 0 6px;
  }
  .section.chorus .section-label { color: var(--section); }
  .section.bridge .section-label { color: var(--accent-2); }
  .section.verse .section-label { color: var(--muted); }

  .comment {
    color: var(--muted);
    font-style: italic;
    margin: 6px 0;
    font-size: 0.95em;
  }

  /* Each lyric line — chord+word cells, RTL flow for Hebrew, LTR for English */
  .lyric-line {
    display: flex;
    flex-direction: row;
    flex-wrap: wrap;
    align-items: flex-end;
    margin: 4px 0;
    row-gap: 14px;
    unicode-bidi: isolate;
  }
  .lyric-line:empty::before { content: "\00a0"; }
  #preview[dir="rtl"] .lyric-line { direction: rtl; }
  #preview[dir="ltr"] .lyric-line { direction: ltr; }
  /* A per-line dir attribute (set by the user via Ctrl+Shift+R/L in the
     editor) wins over the preview-wide direction. */
  .lyric-line[dir="rtl"] { direction: rtl !important; text-align: right; }
  .lyric-line[dir="ltr"] { direction: ltr !important; text-align: left; }

  .cell {
    display: inline-flex;
    flex-direction: column;
    align-items: flex-start;
    unicode-bidi: isolate;
    vertical-align: bottom;
  }
  #preview[dir="rtl"] .cell { direction: rtl; }

  .cell > .chord {
    display: flex;
    gap: 6px;
    color: var(--chord);
    font-weight: 700;
    font-size: 0.78em;
    min-height: 1.3em;
    line-height: 1.2;
    padding-bottom: 2px;
    font-family: ui-monospace, "Cascadia Code", "Consolas", monospace;
    white-space: nowrap;
  }
  #preview[dir="rtl"] .cell > .chord { direction: rtl; }
  .cell > .chord bdi { display: inline-block; }

  .cell > .lyric {
    display: block;
    color: var(--text);
    white-space: pre;
  }

  /* Chord-over-lyric pair (free positioning). Both rows use the SAME
     monospace font + `white-space: pre`, so 1 source space == 1 column == 1
     character of lyric width. The user can shift a chord visually by adding
     or removing spaces in the chord line. For Hebrew, dir="rtl" + explicit
     text-align: right make source column N align from the right edge —
     matching how Hebrew flows. */
  .chord-pair {
    font-family: ui-monospace, "Cascadia Code", "Consolas", "Courier New", monospace;
    margin: 6px 0;
    line-height: 1.3;
  }
  .chord-pair[dir="rtl"] { direction: rtl; text-align: right; }
  .chord-pair[dir="ltr"] { direction: ltr; text-align: left; }
  .chord-pair .chord-row {
    color: var(--chord);
    font-weight: 700;
    font-size: 0.88em;
    min-height: 1.25em;
    white-space: pre;
    unicode-bidi: isolate;
    padding-bottom: 1px;
  }
  .chord-pair .lyric-row {
    color: var(--text);
    white-space: pre;
    unicode-bidi: isolate;
  }
  .chord-pair[dir="rtl"] .chord-row,
  .chord-pair[dir="rtl"] .lyric-row {
    direction: rtl;
    text-align: right;
  }
  .chord-pair[dir="ltr"] .chord-row,
  .chord-pair[dir="ltr"] .lyric-row {
    direction: ltr;
    text-align: left;
  }
  .chord-pair .chord-token {
    unicode-bidi: isolate;
    direction: ltr;
    display: inline-block;
  }
  .chord-pair .chord-marker {
    color: var(--muted);
    font-weight: 700;
    /* Repeat marker (`\`) — same row, dimmed so it visually reads as a
       continuation indicator rather than a real chord. */
  }

  .palette {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
    padding: 6px 12px;
    background: var(--panel-2);
    border-bottom: 1px solid var(--border);
    direction: ltr;
    align-items: center;
  }
  .palette button {
    background: var(--panel);
    border: 1px solid var(--border);
    color: var(--directive);
    padding: 3px 8px;
    border-radius: 4px;
    cursor: pointer;
    font-family: ui-monospace, "Consolas", monospace;
    font-size: 12px;
  }
  .palette button.chord { color: var(--chord); }
  .palette button:hover { border-color: var(--accent); }
  .palette .label {
    color: var(--muted);
    font-size: 11px;
    padding: 0 6px;
    font-family: inherit;
  }
  .palette input {
    background: var(--panel);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 3px 8px;
    border-radius: 4px;
    font-family: ui-monospace, "Consolas", monospace;
    font-size: 12px;
    width: 110px;
    outline: none;
    direction: ltr;
  }

  .empty-hint {
    color: var(--muted);
    font-style: italic;
    text-align: center;
    margin-top: 40px;
    font-family: inherit;
    direction: rtl;
  }

  #printPageHeader { display: none; }
  @media print {
    header, .pane-header, #editor-pane, .palette { display: none !important; }
    html, body, main, .pane, .pane-body {
      display: block !important;
      height: auto !important;
      max-height: none !important;
      overflow: visible !important;
      margin: 0 !important;
      padding: 0 !important;
      background: white !important;
    }
    body { color: black !important; }
    .cell > .chord, .cell > .chord bdi,
    .chord-pair .chord-row, .chord-pair .chord-token { color: #b30000 !important; }
    .cell > .lyric, .song-title,
    .chord-pair .lyric-row { color: #000 !important; }
    .section.chorus, .section.bridge { background: transparent !important; }
    .section .section-label { color: #006400 !important; }
    .section.bridge .section-label { color: #aa6600 !important; }
    .section { border-inline-start-color: #888 !important; }
    .comment { color: #555 !important; }
    .song-meta, .song-artist { color: #444 !important; }
    /* Print column layout follows the on-screen toggle: 2 columns when the
       user enabled .two-cols, otherwise a single column. column-fill: auto
       makes column 1 fill completely before content spills into column 2. */
    #preview.two-cols {
      column-count: 2 !important;
      column-gap: 1cm !important;
      column-rule: 1px dashed #ccc;
      column-fill: auto !important;
      height: 100vh !important;
    }
    #preview:not(.two-cols) {
      column-count: 1 !important;
    }
    .section, .lyric-line { break-inside: avoid; page-break-inside: avoid; }
    #printPageHeader {
      display: block !important;
      position: fixed;
      top: 0; left: 0; right: 0;
      text-align: center;
      font-size: 7.5pt;
      color: #888;
      padding: 0;
      margin: 0;
      line-height: 1.1;
      direction: rtl;
    }
    @page { margin: 0.9cm 1.2cm 0.9cm; size: auto; }
  }
</style>
</head>
<body>

<div id="printPageHeader"></div>

<header>
  <h1>📝</h1>
  <input id="metaTitle" type="text" placeholder="שם השיר" />
  <input id="metaArtist" type="text" placeholder="אומן" />
  <span style="color:var(--muted);font-size:13px;">סולם:</span>
  <input id="metaKey" type="text" placeholder="Am" />
  <span style="color:var(--muted);font-size:13px;">נוכחי:</span>
  <span id="currentKey">—</span>

  <div class="transpose-box">
    <label>טרנספוז:</label>
    <button id="trDown">−</button>
    <input id="transpose" type="range" min="-11" max="11" value="0" step="1" />
    <button id="trUp">+</button>
    <span id="transposeValue">0</span>
    <button id="trReset" class="btn">איפוס</button>
  </div>

  <label class="size-ctrl"><span>A−</span><input id="fontSize" type="range" min="11" max="28" value="16" step="1" /><span>A+</span><span id="fontSizeValue" style="min-width:24px;text-align:center;">16</span></label>
  <label class="size-ctrl"><span>≡</span><input id="lineHeight" type="range" min="1.0" max="2.6" value="1.6" step="0.1" /><span id="lineHeightValue" style="min-width:30px;text-align:center;">1.6</span></label>

  <label style="display:flex;align-items:center;gap:6px;color:var(--muted);font-size:13px;cursor:pointer;">
    <input id="useFlats" type="checkbox" /> במולים (♭)
  </label>

  <button id="btnNew" class="btn">+ חדש</button>
  <button id="btnImport" class="btn">⬆ פתח .cho</button>
  <input id="fileInput" type="file" accept=".cho,.crd,.pro,.chopro,.txt" style="display:none" />
  <button id="btnCols" class="btn" title="עמודה אחת / שתי עמודות בהדפסה">▥ שתי עמודות</button>
  <button id="btnExport" class="btn primary">⬇ שמור .cho</button>
  <button id="btnPdf" class="btn primary">📄 PDF</button>
</header>

<main>
  <div class="pane" id="editor-pane">
    <div class="pane-header">
      <span></span>
      <span id="editorStats" style="color:var(--muted);font-size:11px;"></span>
    </div>
    <div class="palette" id="palette">
      <span class="label">דירקטיבות:</span>
      <button data-snippet="{title: }" data-cursor="-1">title</button>
      <button data-snippet="{artist: }" data-cursor="-1">artist</button>
      <button data-snippet="{key: }" data-cursor="-1">key</button>
      <button data-snippet="{capo: }" data-cursor="-1">capo</button>
      <button data-snippet="{tempo: }" data-cursor="-1">tempo</button>
      <button data-snippet="{comment: }" data-cursor="-1">comment</button>
      <button data-snippet="{start_of_verse}&#10;&#10;{end_of_verse}" data-cursor="-15">verse</button>
      <button data-snippet="{start_of_chorus}&#10;&#10;{end_of_chorus}" data-cursor="-16">chorus</button>
      <button data-snippet="{start_of_bridge}&#10;&#10;{end_of_bridge}" data-cursor="-16">bridge</button>
      <span class="label">אקורדים:</span>
      <button class="chord" data-chord="A">A</button>
      <button class="chord" data-chord="Am">Am</button>
      <button class="chord" data-chord="A7">A7</button>
      <button class="chord" data-chord="Amaj7">Amaj7</button>
      <button class="chord" data-chord="Am7">Am7</button>
      <button class="chord" data-chord="Bm">Bm</button>
      <button class="chord" data-chord="B7">B7</button>
      <button class="chord" data-chord="Bm7">Bm7</button>
      <button class="chord" data-chord="Bb">Bb</button>
      <button class="chord" data-chord="C">C</button>
      <button class="chord" data-chord="C7">C7</button>
      <button class="chord" data-chord="Cmaj7">Cmaj7</button>
      <button class="chord" data-chord="D">D</button>
      <button class="chord" data-chord="Dm">Dm</button>
      <button class="chord" data-chord="D7">D7</button>
      <button class="chord" data-chord="Dmaj7">Dmaj7</button>
      <button class="chord" data-chord="Dm7">Dm7</button>
      <button class="chord" data-chord="E">E</button>
      <button class="chord" data-chord="Em">Em</button>
      <button class="chord" data-chord="E7">E7</button>
      <button class="chord" data-chord="Em7">Em7</button>
      <button class="chord" data-chord="F">F</button>
      <button class="chord" data-chord="F#m">F#m</button>
      <button class="chord" data-chord="Fmaj7">Fmaj7</button>
      <button class="chord" data-chord="G">G</button>
      <button class="chord" data-chord="Gm">Gm</button>
      <button class="chord" data-chord="G7">G7</button>
      <button class="chord" data-chord="Gmaj7">Gmaj7</button>
      <button class="chord" data-chord="Csus4">Csus4</button>
      <button class="chord" data-chord="Dsus4">Dsus4</button>
      <button class="chord" data-chord="Cadd9">Cadd9</button>
      <button class="chord" data-chord="Cdim">Cdim</button>
      <button class="chord" data-chord="Caug">Caug</button>
      <input id="chordInput" type="text" placeholder="אקורד מותאם ↵" />
    </div>
    <textarea id="editor" dir="auto" spellcheck="false" placeholder="{title: שם השיר}
{artist: שם האומן}
{key: Am}

{start_of_verse}
[Am]ערב של [Dm]שושנים
[E7]נצא נא אל ה[Am]בוסתן
{end_of_verse}

{start_of_chorus}
[Dm]לילה יורד [Am]לאט
ו[E7]רוח שושן נו[Am]שבה
{end_of_chorus}"></textarea>
  </div>

  <div class="pane">
    <div class="pane-header">
      <span>תצוגה מקדימה</span>
      <span id="originalKey" style="color:var(--muted);font-size:11px;"></span>
    </div>
    <div class="pane-body">
      <div id="preview"></div>
    </div>
  </div>
</main>

<script>
// ========== Chord music theory (shared with main editor) ==========
const NOTES_SHARP = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
const NOTES_FLAT  = ['C','Db','D','Eb','E','F','Gb','G','Ab','A','Bb','B'];

function parseRoot(token) {
  const m = token.match(/^([A-G])([#b]?)(.*)$/);
  if (!m) return null;
  return { letter: m[1], accidental: m[2], rest: m[3] };
}
function noteToIdx(note) {
  let i = NOTES_SHARP.indexOf(note);
  if (i !== -1) return i;
  return NOTES_FLAT.indexOf(note);
}
function transposeNote(note, semitones, useFlats) {
  const idx = noteToIdx(note);
  if (idx === -1) return note;
  const newIdx = ((idx + semitones) % 12 + 12) % 12;
  return useFlats ? NOTES_FLAT[newIdx] : NOTES_SHARP[newIdx];
}
function transposeChord(chord, semitones, useFlats) {
  if (semitones === 0) return chord;
  const slashIdx = chord.indexOf('/');
  if (slashIdx > 0) {
    return transposeChord(chord.slice(0, slashIdx), semitones, useFlats) + '/' +
           transposeChord(chord.slice(slashIdx + 1), semitones, useFlats);
  }
  const parsed = parseRoot(chord);
  if (!parsed) return chord;
  const newRoot = transposeNote(parsed.letter + parsed.accidental, semitones, useFlats);
  return newRoot + parsed.rest;
}
function isChordToken(token) {
  if (!token) return false;
  const t = token.replace(/^\(|\)$/g, '');
  if (!t) return false;
  if (t.includes('/')) {
    const parts = t.split('/');
    return parts.every(p => p && isChordToken(p));
  }
  return /^[A-G][#b]?[A-Za-z0-9#b+°øΔ△()\-]*$/.test(t);
}

// Strip leading Unicode bidi control marks (LRM/RLM/embedding/override/
// isolate). These are inserted by Ctrl+Shift+L/R to force a line's editor
// direction; the parser ignores them so chord/section detection works.
function stripLeadingBidi(s) {
  return s.replace(/^[\u200E\u200F\u202A-\u202E\u2066-\u2069]+/, '');
}

// Read a forced direction from the leading bidi marks of a raw line. This
// lets the preview honor the user's per-line direction picks (Ctrl+Shift+R
// / Ctrl+Shift+L in the editor) — without it, the preview only listened to
// the document-wide Hebrew detection and ignored per-line marks entirely.
function getForcedLineDir(raw) {
  if (!raw || raw.length === 0) return null;
  const ch = raw.charCodeAt(0);
  // RTL strong marks: RLM, RLE, RLO, RLI
  if (ch === 0x200F || ch === 0x202B || ch === 0x202E || ch === 0x2067) return 'rtl';
  // LTR strong marks: LRM, LRE, LRO, LRI
  if (ch === 0x200E || ch === 0x202A || ch === 0x202D || ch === 0x2066) return 'ltr';
  return null;
}

// A token made entirely of backslashes is a "repeat marker" — the user
// writes `Am \ \ \ Dm` to mark how many times a chord is played. We accept
// it as a valid chord-line token (so the line still pairs with the lyric
// below) but skip transposition / chord-wrapping in the renderer.
function isRepeatMarker(token) {
  return /^\\+$/.test(token);
}

// Treat a line as chord-only if every whitespace-separated token (plain,
// bracketed, or a repeat marker) is valid. Requires at least one real chord
// so a line of pure `\` markers is not mistaken for a chord line.
function isChordOnlyLine(line) {
  const trimmed = line.trim();
  if (!trimmed) return false;
  let i = 0, chordCount = 0;
  while (i < trimmed.length) {
    if (/\s/.test(trimmed[i])) { i++; continue; }
    if (trimmed[i] === '[') {
      const close = trimmed.indexOf(']', i + 1);
      if (close === -1) return false;
      const inner = trimmed.slice(i + 1, close).trim();
      if (!isChordToken(inner)) return false;
      chordCount++; i = close + 1;
    } else {
      let end = i;
      while (end < trimmed.length && !/\s/.test(trimmed[end]) && trimmed[end] !== '[') end++;
      const token = trimmed.slice(i, end);
      if (isChordToken(token)) chordCount++;
      else if (!isRepeatMarker(token)) return false;
      i = end;
    }
  }
  return chordCount > 0;
}

// Extract each chord/marker with its source-column position. Markers carry
// kind: 'marker' so the renderer can leave them as plain text.
function extractChordPositions(line) {
  const positions = [];
  let i = 0;
  while (i < line.length) {
    if (/\s/.test(line[i])) { i++; continue; }
    if (line[i] === '[') {
      const close = line.indexOf(']', i + 1);
      if (close === -1) { i++; continue; }
      positions.push({ col: i, chord: line.slice(i + 1, close).trim(), len: close - i + 1, kind: 'chord' });
      i = close + 1;
    } else {
      let end = i;
      while (end < line.length && !/\s/.test(line[end]) && line[end] !== '[') end++;
      const token = line.slice(i, end);
      const kind = isRepeatMarker(token) ? 'marker' : 'chord';
      positions.push({ col: i, chord: token, len: end - i, kind });
      i = end;
    }
  }
  return positions;
}

// ========== ChordPro parser ==========
// Directives recognized (canonical → short alias map for normalization)
const DIRECTIVE_ALIASES = {
  t: 'title', title: 'title',
  st: 'subtitle', subtitle: 'subtitle', artist: 'subtitle',
  key: 'key', capo: 'capo', tempo: 'tempo', time: 'time',
  album: 'album', year: 'year', composer: 'composer', lyricist: 'lyricist',
  c: 'comment', comment: 'comment',
  ci: 'comment_italic', comment_italic: 'comment_italic',
  cb: 'comment_box', comment_box: 'comment_box',
  sov: 'start_of_verse', start_of_verse: 'start_of_verse',
  eov: 'end_of_verse', end_of_verse: 'end_of_verse',
  soc: 'start_of_chorus', start_of_chorus: 'start_of_chorus',
  eoc: 'end_of_chorus', end_of_chorus: 'end_of_chorus',
  sob: 'start_of_bridge', start_of_bridge: 'start_of_bridge',
  eob: 'end_of_bridge', end_of_bridge: 'end_of_bridge',
  sot: 'start_of_tab', start_of_tab: 'start_of_tab',
  eot: 'end_of_tab', end_of_tab: 'end_of_tab',
  np: 'new_page', new_page: 'new_page', new_song: 'new_song',
};

function parseChordPro(text) {
  const lines = text.split('\n');
  const meta = {};
  const items = [];
  let currentSection = null;
  let i = 0;
  while (i < lines.length) {
    const raw = lines[i];
    // Note the user's per-line direction pick (if any) BEFORE stripping
    // the bidi marks, then strip them so chord/section detection works.
    const forcedDir = getForcedLineDir(raw);
    const line = stripLeadingBidi(raw);
    const trimmed = line.trim();
    if (!trimmed) {
      items.push({ type: 'blank' });
      i++; continue;
    }
    if (trimmed.startsWith('#')) { i++; continue; }
    const dir = trimmed.match(/^\{([^:}]+?)(?::\s*(.*?))?\s*\}$/);
    if (dir) {
      const name = (DIRECTIVE_ALIASES[dir[1].trim().toLowerCase()]) || dir[1].trim().toLowerCase();
      const value = (dir[2] || '').trim();
      switch (name) {
        case 'title': meta.title = value; break;
        case 'subtitle': meta.artist = value; break;
        case 'key': meta.key = value; break;
        case 'capo': meta.capo = value; break;
        case 'tempo': meta.tempo = value; break;
        case 'time': meta.time = value; break;
        case 'album': meta.album = value; break;
        case 'year': meta.year = value; break;
        case 'composer': meta.composer = value; break;
        case 'lyricist': meta.lyricist = value; break;
        case 'comment':
        case 'comment_italic':
        case 'comment_box':
          items.push({ type: 'comment', text: value, style: name });
          break;
        case 'start_of_verse':
          currentSection = { kind: 'verse', label: value };
          items.push({ type: 'section_start', kind: 'verse', label: value });
          break;
        case 'start_of_chorus':
          currentSection = { kind: 'chorus', label: value };
          items.push({ type: 'section_start', kind: 'chorus', label: value });
          break;
        case 'start_of_bridge':
          currentSection = { kind: 'bridge', label: value };
          items.push({ type: 'section_start', kind: 'bridge', label: value });
          break;
        case 'end_of_verse':
        case 'end_of_chorus':
        case 'end_of_bridge':
          items.push({ type: 'section_end' });
          currentSection = null;
          break;
        case 'new_page':
          items.push({ type: 'page_break' });
          break;
        default:
          // Unknown directive — ignore silently. ChordPro renderers
          // commonly do this so unknown extensions don't break things.
          break;
      }
      i++; continue;
    }
    // Non-standard but very convenient: detect a chord-only line followed by
    // a lyric line and render them as a column-aligned chord-over-lyric pair
    // (monospace, spaces in the chord line shift the chord visually).
    if (isChordOnlyLine(line)) {
      const rawNext = lines[i + 1];
      const next = rawNext === undefined ? undefined : stripLeadingBidi(rawNext);
      const nextTrim = next === undefined ? '' : next.trim();
      const nextIsDirective = /^\{/.test(nextTrim);
      const nextIsHash = nextTrim.startsWith('#');
      if (next !== undefined && nextTrim && !isChordOnlyLine(next) && !nextIsDirective && !nextIsHash) {
        // For chord-pair, either line's forced direction wins (lyric first).
        const pairDir = getForcedLineDir(rawNext) || forcedDir;
        items.push({ type: 'chord_pair', chordLine: line, lyricLine: next, forcedDir: pairDir });
        i += 2; continue;
      }
      items.push({ type: 'chord_only', text: line, forcedDir });
      i++; continue;
    }
    items.push({ type: 'lyric', text: line, forcedDir });
    i++;
  }
  return { meta, items };
}

// ========== Render ChordPro to HTML ==========
function escapeHtml(s) {
  return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

// Hebrew detector: any U+0590-U+05FF in the song body decides RTL
function songHasHebrew(text) { return /[֐-׿]/.test(text); }

// Render a chord-line with each chord wrapped in <bdi> and the original
// source spaces preserved between them. With white-space: pre and monospace
// font, every source space is exactly one column wide, so adding/removing
// spaces in the editor moves the chord visually in the preview. When a
// chord grows after transpose (e.g. F → F#) and would collide with the
// next chord, we still keep at least 1 space between them so the chord
// names don't visually run together.
function renderChordOnly(line, semi, useFlats) {
  const positions = extractChordPositions(line);
  let out = '';
  let cursor = 0;
  for (const p of positions) {
    if (p.col > cursor) {
      out += ' '.repeat(p.col - cursor);
    } else if (out !== '') {
      // Source column would collide with the previous (transposed) chord —
      // pad a single space so adjacent tokens stay readable.
      out += ' ';
    }
    if (p.kind === 'marker') {
      // Repeat marker (\, \\, …) — render as plain text, no transpose.
      out += `<span class="chord-marker">${escapeHtml(p.chord)}</span>`;
      cursor = Math.max(p.col, cursor) + p.chord.length;
    } else {
      const display = isChordToken(p.chord) ? transposeChord(p.chord, semi, useFlats) : p.chord;
      out += `<bdi dir="ltr" class="chord-token">${escapeHtml(display)}</bdi>`;
      cursor = Math.max(p.col, cursor) + display.length;
    }
  }
  return out;
}

// chord-over-lyric pair — two stacked monospace lines that share column
// positions. Direction priority: user's forced dir (Ctrl+Shift+R/L marker)
// → Hebrew detection on the lyric. For Hebrew, source column N corresponds
// to visual column N from the right edge.
function renderChordPair(chordLine, lyricLine, semi, useFlats, forcedDir) {
  const dir = forcedDir || (/[֐-׿]/.test(lyricLine) ? 'rtl' : 'ltr');
  const chordHtml = renderChordOnly(chordLine, semi, useFlats);
  return `<div class="chord-pair" dir="${dir}">
    <div class="chord-row">${chordHtml || '&nbsp;'}</div>
    <div class="lyric-row">${escapeHtml(lyricLine) || '&nbsp;'}</div>
  </div>`;
}

// Walk a `[chord]lyric` line into chord+word cells. Same algorithm as the
// main editor: chords accumulate on `pendingChords` until whitespace flushes
// the current cell. Plain text before the first chord forms a no-chord cell.
function renderLyricLine(raw, semitones, useFlats, forcedDir) {
  const cells = [];
  let pendingChords = [];
  let pendingLyric = '';
  const flush = () => {
    if (pendingChords.length > 0 || pendingLyric !== '') {
      cells.push({ chords: pendingChords.slice(), lyric: pendingLyric });
    }
    pendingChords = [];
    pendingLyric = '';
  };
  let i = 0;
  while (i < raw.length) {
    if (raw[i] === '[') {
      const close = raw.indexOf(']', i + 1);
      if (close > i) {
        if (pendingLyric !== '') flush();
        pendingChords.push(raw.slice(i + 1, close).trim());
        i = close + 1;
        continue;
      }
    }
    pendingLyric += raw[i];
    if (/\s/.test(raw[i]) && pendingChords.length > 0) flush();
    i++;
  }
  flush();
  if (cells.length === 0) return '<div class="lyric-line"></div>';
  let html = '';
  for (const cell of cells) {
    const chordHtml = cell.chords.length === 0
      ? '&nbsp;'
      : cell.chords.map(c => {
          const display = isChordToken(c) ? transposeChord(c, semitones, useFlats) : c;
          return `<bdi dir="ltr">${escapeHtml(display)}</bdi>`;
        }).join('');
    const lyric = cell.lyric === '' ? '&nbsp;' : escapeHtml(cell.lyric);
    html += `<span class="cell"><span class="chord">${chordHtml}</span><span class="lyric">${lyric}</span></span>`;
  }
  const dirAttr = forcedDir ? ` dir="${forcedDir}"` : '';
  return `<div class="lyric-line"${dirAttr}>${html}</div>`;
}

function renderChordPro(parsed, semitones, useFlats) {
  const { meta, items } = parsed;
  let html = '';
  // Title block
  if (meta.title) html += `<h1 class="song-title">${escapeHtml(meta.title)}</h1>`;
  if (meta.artist) html += `<p class="song-artist">${escapeHtml(meta.artist)}</p>`;
  // Meta info row — key/capo/tempo
  const metaParts = [];
  if (meta.key) {
    const transposedKey = transposeNote(meta.key.replace(/m$/, ''), semitones, useFlats) +
                          (meta.key.endsWith('m') ? 'm' : '');
    metaParts.push(`<span>סולם: ${escapeHtml(transposedKey)}${semitones !== 0 ? ` (מקור: ${escapeHtml(meta.key)})` : ''}</span>`);
  }
  if (meta.capo) metaParts.push(`<span>קאפו: ${escapeHtml(meta.capo)}</span>`);
  if (meta.tempo) metaParts.push(`<span>tempo: ${escapeHtml(meta.tempo)}</span>`);
  if (meta.time) metaParts.push(`<span>${escapeHtml(meta.time)}</span>`);
  if (metaParts.length) html += `<p class="song-meta">${metaParts.join('')}</p>`;

  // Body
  let openSection = null;
  let sectionBuffer = '';
  const flushSection = () => {
    if (openSection !== null) {
      const labelHtml = openSection.label
        ? `<div class="section-label">${escapeHtml(openSection.label)}</div>`
        : `<div class="section-label">${openSection.kind}</div>`;
      html += `<div class="section ${openSection.kind}">${labelHtml}${sectionBuffer}</div>`;
      openSection = null;
      sectionBuffer = '';
    }
  };
  for (const item of items) {
    if (item.type === 'section_start') {
      flushSection();
      openSection = { kind: item.kind, label: item.label };
      continue;
    }
    if (item.type === 'section_end') {
      flushSection();
      continue;
    }
    if (item.type === 'page_break') {
      flushSection();
      html += '<div style="page-break-after: always; break-after: page;"></div>';
      continue;
    }
    let line = '';
    if (item.type === 'comment') {
      line = `<div class="comment">${escapeHtml(item.text)}</div>`;
    } else if (item.type === 'lyric') {
      line = renderLyricLine(item.text, semitones, useFlats, item.forcedDir);
    } else if (item.type === 'chord_pair') {
      line = renderChordPair(item.chordLine, item.lyricLine, semitones, useFlats, item.forcedDir);
    } else if (item.type === 'chord_only') {
      const dir = item.forcedDir || (/[֐-׿]/.test(item.text) ? 'rtl' : 'ltr');
      line = `<div class="chord-pair" dir="${dir}"><div class="chord-row">${renderChordOnly(item.text, semitones, useFlats) || '&nbsp;'}</div></div>`;
    } else if (item.type === 'blank') {
      line = '<div class="lyric-line"></div>';
    }
    if (openSection) sectionBuffer += line;
    else html += line;
  }
  flushSection();
  return html || '<div class="empty-hint">הקלד שיר בפורמט ChordPro מימין…</div>';
}

// ========== UI wiring ==========
const els = {
  editor: document.getElementById('editor'),
  preview: document.getElementById('preview'),
  transpose: document.getElementById('transpose'),
  transposeValue: document.getElementById('transposeValue'),
  trUp: document.getElementById('trUp'),
  trDown: document.getElementById('trDown'),
  trReset: document.getElementById('trReset'),
  currentKey: document.getElementById('currentKey'),
  originalKey: document.getElementById('originalKey'),
  useFlats: document.getElementById('useFlats'),
  fontSize: document.getElementById('fontSize'),
  fontSizeValue: document.getElementById('fontSizeValue'),
  lineHeight: document.getElementById('lineHeight'),
  lineHeightValue: document.getElementById('lineHeightValue'),
  btnNew: document.getElementById('btnNew'),
  btnImport: document.getElementById('btnImport'),
  btnExport: document.getElementById('btnExport'),
  btnPdf: document.getElementById('btnPdf'),
  btnCols: document.getElementById('btnCols'),
  metaTitle: document.getElementById('metaTitle'),
  metaArtist: document.getElementById('metaArtist'),
  metaKey: document.getElementById('metaKey'),
  fileInput: document.getElementById('fileInput'),
  palette: document.getElementById('palette'),
  chordInput: document.getElementById('chordInput'),
  printPageHeader: document.getElementById('printPageHeader'),
  editorStats: document.getElementById('editorStats'),
};

function update() {
  const text = els.editor.value;
  const semi = parseInt(els.transpose.value, 10);
  const useFlats = els.useFlats.checked;
  els.transposeValue.textContent = (semi >= 0 ? '+' : '') + semi;
  const parsed = parseChordPro(text);
  // Key display
  if (parsed.meta.key) {
    const orig = parsed.meta.key.replace(/m$/, '');
    const cur = transposeNote(orig, semi, useFlats);
    els.currentKey.textContent = cur + (parsed.meta.key.endsWith('m') ? 'm' : '');
    els.originalKey.textContent = semi !== 0 ? `מקור: ${parsed.meta.key}` : '';
  } else {
    els.currentKey.textContent = '—';
    els.originalKey.textContent = '';
  }
  // Direction (RTL for any Hebrew content)
  const dir = songHasHebrew(text) ? 'rtl' : 'ltr';
  els.preview.setAttribute('dir', dir);
  // Render
  els.preview.innerHTML = renderChordPro(parsed, semi, useFlats);
  // Stats
  els.editorStats.textContent = `${text.split('\n').length} שורות`;
  // Sync header inputs from the source — skip whichever field is focused so
  // we don't fight the user's typing.
  if (document.activeElement !== els.metaTitle) els.metaTitle.value = parsed.meta.title || '';
  if (document.activeElement !== els.metaArtist) els.metaArtist.value = parsed.meta.artist || '';
  if (document.activeElement !== els.metaKey) els.metaKey.value = parsed.meta.key || '';
}

// Insert/update/remove a top-level directive in the source. Used by the
// header inputs so editing the title field rewrites `{title: ...}` in the
// editor, and clearing the field deletes the directive line entirely.
function setDirective(name, value) {
  let text = els.editor.value;
  // Match the FIRST occurrence anywhere; ChordPro convention puts meta at top
  const re = new RegExp(`^\\{\\s*${name}\\s*:[^}]*\\}\\s*\\r?\\n?`, 'mi');
  const trimmedValue = value.trim();
  if (re.test(text)) {
    if (trimmedValue === '') {
      text = text.replace(re, '');
    } else {
      text = text.replace(re, `{${name}: ${trimmedValue}}\n`);
    }
  } else if (trimmedValue !== '') {
    text = `{${name}: ${trimmedValue}}\n` + text;
  }
  // Preserve cursor position roughly — store and restore caret
  const caret = els.editor.selectionStart;
  els.editor.value = text;
  els.editor.selectionStart = els.editor.selectionEnd = Math.min(caret, text.length);
  update();
}

// Insert text at cursor (used by palette buttons)
function insertAtCursor(text, cursorOffsetFromEnd = 0) {
  const t = els.editor;
  t.focus();
  const start = t.selectionStart;
  const end = t.selectionEnd;
  const v = t.value;
  t.value = v.slice(0, start) + text + v.slice(end);
  const newPos = start + text.length + cursorOffsetFromEnd;
  t.selectionStart = t.selectionEnd = newPos;
  update();
}

// Palette buttons
els.palette.querySelectorAll('button').forEach(btn => {
  btn.addEventListener('mousedown', e => e.preventDefault());
  btn.addEventListener('click', () => {
    if (btn.dataset.snippet) {
      const snippet = btn.dataset.snippet;
      const offset = parseInt(btn.dataset.cursor || '0', 10);
      insertAtCursor(snippet, offset);
    } else if (btn.dataset.chord) {
      insertAtCursor('[' + btn.dataset.chord + ']');
    }
  });
});
// Custom chord input
els.chordInput.addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    e.preventDefault();
    const c = els.chordInput.value.trim();
    if (c) {
      insertAtCursor('[' + c + ']');
      els.chordInput.value = '';
      els.editor.focus();
    }
  }
});

// Header meta inputs — typing in them rewrites the corresponding directive
// in the source. `input` event is debounced naturally because setDirective
// just splices the source string.
els.metaTitle.addEventListener('input', () => setDirective('title', els.metaTitle.value));
els.metaArtist.addEventListener('input', () => setDirective('artist', els.metaArtist.value));
els.metaKey.addEventListener('input', () => setDirective('key', els.metaKey.value));

// Two-column toggle (affects screen + print layout)
els.btnCols.addEventListener('click', () => {
  const isTwo = els.preview.classList.toggle('two-cols');
  els.btnCols.textContent = isTwo ? '▥ עמודה אחת' : '▥ שתי עמודות';
  localStorage.setItem('chordProEditor.twoCols', isTwo ? '1' : '0');
});

// Transpose
els.editor.addEventListener('input', update);
els.transpose.addEventListener('input', update);
els.useFlats.addEventListener('change', () => { localStorage.setItem('chordProEditor.useFlats', els.useFlats.checked ? '1' : '0'); update(); });
els.trUp.addEventListener('click', () => { els.transpose.value = Math.min(11, parseInt(els.transpose.value,10) + 1); update(); });
els.trDown.addEventListener('click', () => { els.transpose.value = Math.max(-11, parseInt(els.transpose.value,10) - 1); update(); });
els.trReset.addEventListener('click', () => { els.transpose.value = 0; update(); });

// Typography
function applyFontSize(v) {
  els.preview.style.setProperty('--preview-font-size', v + 'px');
  els.fontSizeValue.textContent = v;
}
function applyLineHeight(v) {
  els.preview.style.setProperty('--preview-line-height', v);
  els.lineHeightValue.textContent = parseFloat(v).toFixed(1);
}
els.fontSize.addEventListener('input', () => { applyFontSize(els.fontSize.value); localStorage.setItem('chordProEditor.fontSize', els.fontSize.value); });
els.lineHeight.addEventListener('input', () => { applyLineHeight(els.lineHeight.value); localStorage.setItem('chordProEditor.lineHeight', els.lineHeight.value); });

// New / import / export
els.btnNew.addEventListener('click', () => {
  if (els.editor.value.trim() && !confirm('להתחיל שיר חדש? התוכן הקיים יימחק.')) return;
  els.editor.value = '';
  els.transpose.value = 0;
  update();
});

els.btnImport.addEventListener('click', () => els.fileInput.click());
els.fileInput.addEventListener('change', e => {
  const f = e.target.files[0];
  if (!f) return;
  const reader = new FileReader();
  reader.onload = () => {
    els.editor.value = reader.result;
    update();
  };
  reader.readAsText(f, 'utf-8');
  e.target.value = '';
});

els.btnExport.addEventListener('click', () => {
  const text = els.editor.value;
  const parsed = parseChordPro(text);
  const semi = parseInt(els.transpose.value, 10);
  const useFlats = els.useFlats.checked;
  // If the user has transposed, write a transposed copy. Update {key:} too.
  let out = text;
  if (semi !== 0) {
    // Transpose all [chord] markers in the source text
    out = text.replace(/\[([^\]]+)\]/g, (m, chord) => {
      const trimmed = chord.trim();
      if (isChordToken(trimmed)) return '[' + transposeChord(trimmed, semi, useFlats) + ']';
      return m;
    });
    // Transpose {key: X} value too
    out = out.replace(/\{key:\s*([^}]+)\}/i, (m, key) => {
      const k = key.trim();
      const root = k.replace(/m$/, '');
      return '{key: ' + transposeNote(root, semi, useFlats) + (k.endsWith('m') ? 'm' : '') + '}';
    });
  }
  const blob = new Blob([out], { type: 'text/plain;charset=utf-8' });
  const a = document.createElement('a');
  const name = (parsed.meta.title || 'song').replace(/[\\/:*?"<>|]/g, '_');
  a.href = URL.createObjectURL(blob);
  a.download = name + '.cho';
  a.click();
  URL.revokeObjectURL(a.href);
});

// PDF — same minimal running header as the main editor
const APP_TITLE = document.title;
function buildPrintHeader() {
  const text = els.editor.value;
  const parsed = parseChordPro(text);
  const parts = [];
  if (parsed.meta.title) parts.push(parsed.meta.title);
  if (parsed.meta.artist) parts.push(parsed.meta.artist);
  if (parsed.meta.key) {
    const semi = parseInt(els.transpose.value, 10);
    const useFlats = els.useFlats.checked;
    const orig = parsed.meta.key.replace(/m$/, '');
    const cur = transposeNote(orig, semi, useFlats) + (parsed.meta.key.endsWith('m') ? 'm' : '');
    parts.push(semi === 0 ? cur : `${cur} (מקור ${parsed.meta.key})`);
  }
  return parts.join(' · ') || 'שיר';
}
window.addEventListener('beforeprint', () => {
  const header = buildPrintHeader();
  els.printPageHeader.textContent = header;
  document.title = header;
});
window.addEventListener('afterprint', () => { document.title = APP_TITLE; });
els.btnPdf.addEventListener('click', () => window.print());

// Force the direction of every line covered by the current selection (or the
// caret's line if nothing is selected). Adds an invisible Unicode mark at
// each line's start — RLM (U+200F) for RTL, LRM (U+200E) for LTR. The
// textarea's `unicode-bidi: plaintext` picks up the mark as the line's first
// strong character and re-flows that line accordingly. Works on any number
// of lines and is language-agnostic — English chord lines and Hebrew lyric
// lines both get the same treatment.
function setSelectionDirection(dir) {
  const editor = els.editor;
  const start = editor.selectionStart;
  const end = editor.selectionEnd;
  const v = editor.value;
  const selStart = v.lastIndexOf('\n', start - 1) + 1;
  let selEnd;
  if (end > 0 && v[end - 1] === '\n') {
    selEnd = end - 1;
  } else {
    const nl = v.indexOf('\n', end);
    selEnd = nl === -1 ? v.length : nl;
  }
  const block = v.slice(selStart, selEnd);
  const marker = dir === 'rtl' ? '\u200F' : dir === 'ltr' ? '\u200E' : '';
  const stripRe = /^[\u200E\u200F\u202A-\u202E\u2066-\u2069]+/;
  const newBlock = block
    .split('\n')
    .map(line => marker + line.replace(stripRe, ''))
    .join('\n');
  editor.value = v.slice(0, selStart) + newBlock + v.slice(selEnd);
  editor.selectionStart = selStart;
  editor.selectionEnd = selStart + newBlock.length;
  editor.focus();
  update();
}

// Keyboard shortcuts
document.addEventListener('keydown', e => {
  // Ctrl+Alt+[A-G] → insert chord at cursor
  if (e.ctrlKey && e.altKey && !e.shiftKey && !e.metaKey) {
    const m = e.code.match(/^Key([A-G])$/);
    if (m) {
      e.preventDefault();
      insertAtCursor('[' + m[1] + ']');
      return;
    }
  }
  // Ctrl+Shift+R → force selected lines RTL
  // Ctrl+Shift+L → force selected lines LTR
  // Use e.code so it's keyboard-layout independent (Hebrew + English).
  if (e.ctrlKey && e.shiftKey && !e.altKey && !e.metaKey) {
    if (e.code === 'KeyR') {
      e.preventDefault();
      setSelectionDirection('rtl');
      return;
    }
    if (e.code === 'KeyL') {
      e.preventDefault();
      setSelectionDirection('ltr');
      return;
    }
  }
});

// Initial restore
(function init() {
  const useFlats = localStorage.getItem('chordProEditor.useFlats') === '1';
  els.useFlats.checked = useFlats;
  const fs = localStorage.getItem('chordProEditor.fontSize');
  if (fs) { els.fontSize.value = fs; applyFontSize(fs); } else applyFontSize(els.fontSize.value);
  const lh = localStorage.getItem('chordProEditor.lineHeight');
  if (lh) { els.lineHeight.value = lh; applyLineHeight(lh); } else applyLineHeight(els.lineHeight.value);
  if (localStorage.getItem('chordProEditor.twoCols') === '1') {
    els.preview.classList.add('two-cols');
    els.btnCols.textContent = '▥ עמודה אחת';

  // Seed with sample content if editor is empty
  if (!els.editor.value.trim()) {
